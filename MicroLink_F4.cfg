# 1. 指定调试器驱动为 CMSIS-DAP (DAPLink 固件使用的是此标准协议)
adapter driver cmsis-dap

# 2. 指定通信协议 (Transport)
# 通常 DAPLink 配合 ARM Cortex 芯片使用的是 SWD 接口
# 如果你的目标板必须使用 JTAG，请将其修改为: transport select jtag
transport select swd

# 3. 设置调试时钟速度 (单位: kHz)
# 2000 kHz (2MHz) 是一个比较稳定且适中的速度。
# 如果你发现连接不稳定，可以尝试降低到 1000；如果走线很好，可以尝试提高到 4000 或 10000。
adapter speed 10000

# 4. 目标芯片 (Target MCU) 配置
# ==========================================
# 【重要】请根据你的实际芯片型号取消注释或修改下面的一行！
# STM32F1xx / GD32F1xx:
# source [find target/stm32f1x.cfg]
# STM32F4xx:
source [find target/stm32f4x.cfg]
# STM32G4xx:
# source [find target/stm32g4x.cfg]
# STM32H7xx:
# source [find target/stm32h7x.cfg]

# 5. (可选) 配置复位行为
# 如果 DAPLink 的 RESET (nRST) 引脚正确连接到了目标芯片，可以取消下面这行的注释
# reset_config srst_only